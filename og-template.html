<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0B0F1A 0%, #0F172A 40%, #1E1B4B 100%);
    font-family: Inter, system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  /* Orbs */
  .orb1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,70,229,0.2) 0%, transparent 70%);
    top: -150px; left: -100px;
    filter: blur(60px);
  }
  .orb2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
    bottom: -100px; right: -50px;
    filter: blur(60px);
  }
  .content {
    position: relative;
    text-align: center;
    z-index: 1;
  }
  .logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 40px;
    font-size: 28px; font-weight: 800; color: white;
  }
  h1 {
    font-size: 72px;
    font-weight: 700;
    color: white;
    letter-spacing: -3px;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  h1 span {
    background: linear-gradient(135deg, #818CF8, #A78BFA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    font-size: 26px;
    color: #94A3B8;
    font-weight: 400;
  }
  .url {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 20px;
    color: #475569;
  }
  .badge {
    position: absolute;
    bottom: 40px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .badge-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #4F46E5;
  }
  .badge-text {
    font-size: 18px;
    color: #64748B;
    font-weight: 500;
  }
  .glow-line {
    position: absolute;
    bottom: 0;
    left: 100px;
    right: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4F46E5, #7C3AED, transparent);
    opacity: 0.4;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="content">
    <div class="logo">C</div>
    <h1>Your AI team,<br><span>deployed in minutes.</span></h1>
    <p>Join the waitlist → cadre.run</p>
  </div>
  <div class="badge">
    <div class="badge-dot"></div>
    <span class="badge-text">Now accepting early access</span>
  </div>
  <div class="url">cadre.run</div>
  <div class="glow-line"></div>
</body>
</html>
